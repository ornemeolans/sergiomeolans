    <section class="pages-banner">
        <h1>CONTACTO</h1>
        <p>Hola, gracias por tu interés. Déjame tu mensaje y te responderé a la brevedad.</p>
    </section>

    <main class="container my-5">
        <div class="row g-5">
            <section class="col-lg-6">
                <div class="p-4 bg-white shadow-sm rounded">
                    <h2 class="h4 mb-4 text-uppercase" style="font-family: 'Playfair Display';">Envíame un mensaje</h2>
                    <form id="contacto-form">
                        <div class="mb-3">
                            <label for="nombre" class="form-label">Nombre</label>
                            <input type="text" class="form-control" id="nombre" placeholder="Tu nombre" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" placeholder="contacto@ejemplo.com"
                                required>
                        </div>
                        <div class="mb-3">
                            <label for="mensaje" class="form-label">Mensaje</label>
                            <textarea class="form-control" id="mensaje" rows="4"
                                placeholder="Escribe tu consulta aquí..." required></textarea>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary"
                                style="background-color: #8b5a2b; border: none;">ENVIAR</button>
                            <button type="reset" class="btn btn-outline-secondary btn-sm">Resetear</button>
                        </div>
                    </form>
                </div>
            </section>

            <section class="col-lg-6">
                <div class="contact-info">
                    <h2 class="h4 mb-4 text-uppercase" style="font-family: 'Playfair Display';">Información de contacto
                    </h2>

                    <div class="mb-4 d-flex flex-column gap-3">
                        <a href="mailto:sergiomeolans@gmail.com"
                            class="text-decoration-none text-dark d-flex align-items-center gap-2">
                            <img src="../ASSETS/IMG/gmail.png" alt="Email" width="24"> sergiomeolans@gmail.com
                        </a>
                        <a href="https://walink.co/509807" target="_blank"
                            class="text-decoration-none text-dark d-flex align-items-center gap-2">
                            <img src="../ASSETS/IMG/whatsapp.png" alt="WhatsApp" width="24"> 3516560696
                        </a>
                        <p class="d-flex align-items-center gap-2 mb-0">
                            <img src="../ASSETS/IMG/maps.png" alt="Dirección" width="24"> Francisco del Prado 2893,
                            Córdoba, Argentina
                        </p>
                    </div>

                    <div class="ratio ratio-16x9 shadow-sm rounded overflow-hidden">
                        <iframe
                            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3405.0212004245654!2d-64.1524278!3d-31.4135014!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x9432a2a096956247%3A0x6a0a09e0750e4157!2sFrancisco%20del%20Prado%202893%2C%20X5010%20C%C3%B3rdoba!5e0!3m2!1ses-419!2sar!4v1700000000000!5m2!1ses-419!2sar"
                            style="border:0;" allowfullscreen="" loading="lazy"
                            referrerpolicy="no-referrer-when-downgrade">
                        </iframe>
                    </div>
                </div>
